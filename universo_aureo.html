<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNIVERSO ÁUREO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#FFD700;--g2:#FF8C00;--bg:#05050e;--bg2:#0b0b1a;--bg3:#111128;
  --panel:rgba(13,13,30,0.98);--bdr:rgba(255,215,0,0.2);--bdr2:rgba(255,215,0,0.45);
  --txt:#c8d4ee;--txt2:rgba(200,212,238,0.55);--red:#ff3d5a;--grn:#00ffaa;--r:12px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--txt);font-family:'Rajdhani',sans-serif}
#bgCanvas{position:fixed;inset:0;z-index:0;opacity:.4}
/* LOGIN */
#pgLogin{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,165,0,.08) 0%,transparent 70%),var(--bg)}
.login-box{width:min(460px,92vw);background:var(--panel);border:1px solid var(--bdr2);
  border-radius:20px;padding:44px 40px 40px;
  box-shadow:0 0 60px rgba(255,165,0,.08),0 24px 80px rgba(0,0,0,.7);
  animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.login-logo{font-family:'Orbitron',monospace;font-size:clamp(1.3rem,3.5vw,2rem);
  font-weight:900;text-align:center;margin-bottom:6px;
  background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.login-sub{text-align:center;font-size:.78rem;letter-spacing:.22em;
  color:rgba(255,215,0,.35);text-transform:uppercase;margin-bottom:32px}
.sys-status{display:flex;align-items:center;gap:8px;justify-content:center;
  margin-bottom:28px;font-size:.72rem;letter-spacing:.18em;
  color:rgba(255,215,0,.4);text-transform:uppercase}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--g);
  box-shadow:0 0 6px var(--g);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.key-input{width:100%;padding:14px 18px;background:rgba(5,5,14,.85);
  border:1px solid var(--bdr);border-radius:var(--r);color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:.06em;
  outline:none;transition:.2s border-color,.2s box-shadow;margin-bottom:14px}
.key-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(255,215,0,.07)}
.key-input::placeholder{color:rgba(255,255,255,.18)}
.btn-login{width:100%;padding:14px;
  background:linear-gradient(135deg,var(--g2),var(--g));color:#05050e;border:none;
  border-radius:var(--r);font-family:'Orbitron',monospace;font-size:.8rem;
  font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
  position:relative;overflow:hidden;transition:.25s transform,.25s box-shadow}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(255,165,0,.4)}
.btn-login::after{content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.1) 50%,transparent 65%);
  transform:translateX(-100%);transition:.6s}
.btn-login:hover::after{transform:translateX(100%)}
.alert{padding:11px 14px;border-radius:9px;font-size:.88rem;text-align:center;
  margin-top:12px;display:none}
.alert-err{background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.35);color:#ff7a90}
.alert-ok{background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.3);color:#00ffcc}
/* MAIN */
#pgMain{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;background:var(--bg2)}
.topbar{flex-shrink:0;display:flex;align-items:center;height:52px;padding:0 20px;gap:14px;
  background:rgba(5,5,14,.97);border-bottom:1px solid var(--bdr);position:relative;z-index:20}
.topbar-logo{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:900;
  letter-spacing:.12em;background:linear-gradient(90deg,#ffd700,#ff8c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.topbar-sep{flex:1}
.sess-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);
  font-size:.68rem;color:rgba(255,215,0,.5);font-family:'Rajdhani',sans-serif}
.sess-chip strong{color:var(--g)}
.btn-sair{padding:6px 14px;font-family:'Orbitron',monospace;font-size:.65rem;
  letter-spacing:.1em;font-weight:700;background:transparent;
  border:1px solid rgba(255,61,90,.4);color:rgba(255,61,90,.7);
  border-radius:8px;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-sair:hover{border-color:var(--red);color:var(--red)}
.plat-nav{flex-shrink:0;display:flex;align-items:stretch;background:rgba(5,5,14,.95);
  border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none;
  padding:0 16px;gap:2px}
.plat-nav::-webkit-scrollbar{display:none}
.plat-tab{display:flex;align-items:center;gap:8px;padding:0 20px;height:44px;
  font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:rgba(255,215,0,.35);
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;
  transition:.2s all;flex-shrink:0;background:none;
  border-left:none;border-right:none;border-top:none}
.plat-tab:hover{color:rgba(255,215,0,.7)}
.plat-tab.ativo{color:var(--g);border-bottom-color:var(--g);background:rgba(255,215,0,.04)}
.tab-badge{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.2);
  border-radius:20px;padding:1px 7px;font-size:.6rem;color:rgba(255,215,0,.5)}
.viewer-area{flex:1;overflow:hidden;position:relative}
.plat-panel{position:absolute;inset:0;display:none;flex-direction:column}
.plat-panel.ativo{display:flex}
.file-selector{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--bg2);gap:16px;padding:30px}
.file-selector h2{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;
  letter-spacing:.12em;color:var(--g);margin-bottom:8px;text-align:center}
.file-selector p{font-size:.85rem;color:var(--txt2);text-align:center;max-width:380px}
.files-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px}
.file-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 28px;
  background:rgba(13,13,30,.9);border:1px solid var(--bdr);border-radius:14px;
  cursor:pointer;transition:.25s all;min-width:130px;color:var(--txt);
  font-family:'Rajdhani',sans-serif}
.file-btn:hover{border-color:var(--g);box-shadow:0 0 20px rgba(255,215,0,.12);
  transform:translateY(-3px)}
.file-btn .fb-icon{font-size:2.4rem}
.file-btn .fb-name{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;
  letter-spacing:.05em;color:var(--g);text-align:center;word-break:break-all;max-width:120px}
.file-btn .fb-size{font-size:.75rem;color:var(--txt2)}
.content-frame{position:absolute;inset:0;display:none;flex-direction:column}
.content-frame.visivel{display:flex}
.content-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;height:40px;
  padding:0 14px;background:rgba(5,5,14,.97);border-bottom:1px solid var(--bdr);font-size:.72rem}
.cb-back{padding:4px 12px;font-family:'Orbitron',monospace;font-size:.62rem;
  letter-spacing:.1em;font-weight:700;background:rgba(255,215,0,.08);
  border:1px solid var(--bdr);color:rgba(255,215,0,.6);border-radius:7px;
  cursor:pointer;transition:.2s;flex-shrink:0}
.cb-back:hover{border-color:var(--g);color:var(--g)}
.cb-name{font-family:'Orbitron',monospace;font-size:.68rem;color:var(--g);
  letter-spacing:.08em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-info{color:var(--txt2);font-size:.7rem;flex-shrink:0}
.content-body{flex:1;overflow:hidden;position:relative;background:#fff}
.content-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
.content-body.code-mode{background:rgba(3,3,10,.95);overflow:auto}
.content-body pre{padding:24px;font-family:'Courier New',monospace;font-size:.83rem;
  line-height:1.6;color:#a8c8e8;white-space:pre-wrap;word-break:break-all;min-height:100%}
.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--bg2);z-index:5;
  font-family:'Orbitron',monospace;font-size:.75rem;letter-spacing:.2em;
  color:rgba(255,215,0,.4);gap:16px}
.spin{width:40px;height:40px;border:3px solid rgba(255,215,0,.1);
  border-top-color:var(--g);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.corner-tl,.corner-br{position:fixed;width:80px;height:80px;z-index:1;pointer-events:none}
.corner-tl{top:0;left:0;border-top:2px solid rgba(255,215,0,.1);border-left:2px solid rgba(255,215,0,.1)}
.corner-br{bottom:0;right:0;border-bottom:2px solid rgba(255,215,0,.1);border-right:2px solid rgba(255,215,0,.1)}
@media(max-width:500px){.login-box{padding:32px 24px}.plat-tab{padding:0 12px;font-size:.6rem}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="corner-tl"></div><div class="corner-br"></div>
<div id="pgLogin">
  <div class="login-box">
    <div class="login-logo">🔐 UNIVERSO ÁUREO</div>
    <div class="login-sub">Acesso controlado por licença</div>
    <div class="sys-status"><span class="sys-dot"></span>SISTEMA PROTEGIDO · AGUARDANDO AUTENTICAÇÃO</div>
    <input id="chaveInput" class="key-input" placeholder="Insira sua chave  (ex: UA-XXXXXXXX)" autocomplete="off" spellcheck="false">
    <button class="btn-login" id="btnLogin">🔓 ACESSAR SISTEMA</button>
    <div id="alertErr" class="alert alert-err"></div>
    <div id="alertOk"  class="alert alert-ok"></div>
  </div>
</div>
<div id="pgMain">
  <div class="topbar">
    <div class="topbar-logo">🔐 UNIVERSO ÁUREO</div>
    <div id="sessChips" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    <div class="topbar-sep"></div>
    <div id="topInfo" style="font-size:.7rem;color:rgba(255,215,0,.35);letter-spacing:.08em"></div>
    <button class="btn-sair" onclick="sair()">⏻ SAIR</button>
  </div>
  <nav class="plat-nav" id="platNav"></nav>
  <div class="viewer-area" id="viewerArea"></div>
</div>

// Gera um token de sessão único (armazenado em sessionStorage)
const SESSION_TOKEN = (() => {
    const stored = sessionStorage.getItem('alma_token');
    if (stored) return stored;
    const newToken = Array.from(crypto.getRandomValues(new Uint8Array(24)))
        .map(b => b.toString(16).padStart(2,'0')).join('').slice(0,32);
    sessionStorage.setItem('alma_token', newToken);
    return newToken;
})();

// 🔐 FUNÇÃO DE FINGERPRINT ROBUSTA (ASSÍNCRONA)
async function fp() {
    // Coleta dados básicos
    const data = [
        navigator.userAgent,
        navigator.language,
        screen.width,
        screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 'unknown',
        navigator.deviceMemory || 'unknown',
        navigator.platform || 'unknown'
    ];

    // Canvas fingerprint
    const canvas = document.createElement('canvas');
    canvas.width = 200;
    canvas.height = 50;
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(0, 0, 100, 50);
    ctx.fillStyle = '#069';
    ctx.fillText('UA Fingerprint', 2, 15);
    const canvasData = canvas.toDataURL();
    data.push(canvasData);

    // Lista de fontes (se disponível)
    if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
        const fonts = Array.from(document.fonts).map(f => f.family).join(',');
        data.push(fonts);
    }

    // Gera hash SHA-256 (usando Web Crypto API)
    const encoder = new TextEncoder();
    const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(data.join('|')));
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function validar(){
  const chave=document.getElementById('chaveInput').value.trim().toUpperCase();
  hide('alertErr');hide('alertOk');
  if(!chave)return err('❌ Insira uma chave.');
  if(!LICENCAS[chave])return err('❌ Chave não reconhecida.');
  const lic=LICENCAS[chave];
  if(!lic.ativa)return err('❌ Licença revogada.');
  if(new Date()>new Date(lic.expiracao))return err('❌ Licença expirada.');
  const f = await fp(); // <-- aguarda o fingerprint
  const ja=lic.ativacoes.includes(f);
  if(!ja && lic.ativacoes.length>=lic.max_ativacoes)return err(`❌ Limite de ${lic.max_ativacoes} ativação(ões) atingido.`);
  if(!ja){lic.ativacoes.push(f); try{localStorage.setItem('ua_v4_'+chave,JSON.stringify(lic.ativacoes))}catch(_){}  }
  sessaoChave=chave; sessaoLic=lic; sessaoFingerprint=f; // <-- armazena fingerprint
  ok('✅ Acesso autorizado!'); await sleep(700);
  hide('pgLogin'); show('pgMain','flex');
  atualizarSession(); ativarPlat(0);
}
function construirUI(){
  const nav=document.getElementById('platNav'),area=document.getElementById('viewerArea');
  nav.innerHTML='';area.innerHTML='';
  PLATAFORMAS.forEach((plat,pi)=>{
    const tab=document.createElement('button');
    tab.className='plat-tab'+(pi===0?' ativo':'');
    tab.onclick=()=>ativarPlat(pi);
    tab.innerHTML=`<span>${plat.icon}</span><span>${plat.name}</span><span class="tab-badge">${plat.arquivos.length}</span>`;
    nav.appendChild(tab);
    const painel=document.createElement('div');
    painel.className='plat-panel'+(pi===0?' ativo':'');
    painel.id=`panel-${pi}`;
    const sel=document.createElement('div');
    sel.className='file-selector';sel.id=`sel-${pi}`;
    sel.innerHTML=(plat.descricao?`<h2>${plat.icon} ${plat.name}</h2><p>${plat.descricao}</p>`:`<h2>${plat.icon} ${plat.name}</h2>`)+'<div class="files-grid" id="fg-'+pi+'"></div>';
    plat.arquivos.forEach((arq,ai)=>{
      const icon={web:'🌐',python:'🐍',javascript:'⚡',php:'🐘'}[arq.tipo]||'📄';
      const fb=document.createElement('div');fb.className='file-btn';fb.onclick=()=>abrirArquivo(pi,ai);
      fb.innerHTML=`<span class="fb-icon">${icon}</span><span class="fb-name">${arq.filename}</span><span class="fb-size">${(arq.tam/1024).toFixed(1)} KB</span>`;
      sel.querySelector('#fg-'+pi).appendChild(fb);
    });
    painel.appendChild(sel);
    const frame=document.createElement('div');frame.className='content-frame';frame.id=`frame-${pi}`;
    frame.innerHTML=`<div class="content-bar"><button class="cb-back" onclick="fecharFrame(${pi})">← VOLTAR</button><span class="cb-name" id="fname-${pi}"></span><span class="cb-info" id="finfo-${pi}"></span></div><div class="content-body" id="fbody-${pi}"><div class="loading-overlay" id="fload-${pi}"><div class="spin"></div>DESCRIPTOGRAFANDO…</div></div>`;
    painel.appendChild(frame);area.appendChild(painel);
  });
}
function ativarPlat(pi){platAtiva=pi;document.querySelectorAll('.plat-tab').forEach((t,i)=>t.classList.toggle('ativo',i===pi));document.querySelectorAll('.plat-panel').forEach((p,i)=>p.classList.toggle('ativo',i===pi))}
async function abrirArquivo(pi,ai){
  const plat=PLATAFORMAS[pi],arq=plat.arquivos[ai];
  const sel=document.getElementById(`sel-${pi}`),frame=document.getElementById(`frame-${pi}`);
  const load=document.getElementById(`fload-${pi}`),body=document.getElementById(`fbody-${pi}`);
  sel.style.display='none';frame.classList.add('visivel');load.style.display='flex';
  document.getElementById(`fname-${pi}`).textContent=arq.filename;
  document.getElementById(`finfo-${pi}`).textContent=`${(arq.tam/1024).toFixed(1)} KB · ${arq.tipo}`;
  try{
    const key=await getKey(arq.salt),raw=await decrypt(key,arq.iv,arq.data),txt=new TextDecoder().decode(raw);
    load.style.display='none';
    if(arq.tipo==='web'){
      body.className='content-body';
      body.innerHTML='<iframe id="ci-'+pi+'" style="width:100%;height:100%;border:none"></iframe>';
      const iframe = document.getElementById('ci-'+pi);
      iframe.srcdoc = txt;
      // Wait for iframe to load, then send token
      iframe.onload = function() {
        try {
          iframe.contentWindow.postMessage({
            type: 'ALMA_AUTH',
            token: SESSION_TOKEN,
            email: ''
          }, '*');
        } catch(e) {}
      };
    }
    else{body.className='content-body code-mode';body.innerHTML=`<pre>${txt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;}
  }catch(e){load.style.display='none';body.className='content-body code-mode';body.innerHTML=`<pre style="color:#ff7a90">❌ Erro: ${e.message}</pre>`;}
}
function fecharFrame(pi){
  document.getElementById(`frame-${pi}`).classList.remove('visivel');
  document.getElementById(`sel-${pi}`).style.display='';
  const body=document.getElementById(`fbody-${pi}`);
  body.innerHTML=`<div class="loading-overlay" id="fload-${pi}"><div class="spin"></div>DESCRIPTOGRAFANDO…</div>`;
